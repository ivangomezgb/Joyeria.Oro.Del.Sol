<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay">
    <div class="panel">

        <div class="panel-header">
            <h2>Crear Cuenta</h2>
            <span class="cerrar">✕</span>
        </div>


        <p>Completa el formulario para crear tu cuenta</p>

        <form>

            <label for="nombre">Nombre completo *</label>
            <input type="text" id="nombre" placeholder="Juan Pérez">

            <label for="correo">Correo electrónico *</label>
            <input type="email" id="correo" placeholder="correo@gmail.com">

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="3001234567">

            <label for="password">Contraseña *</label>
            <div class="password-box">
                <input type="password" id="password">
                <span class="ojo">👁</span>
            </div>

            <label for="confirmar">Confirmar contraseña *</label>
            <input type="password" id="confirmar">

            <button class="btn-primary">Crear Cuenta</button>
            <p>ya tienes una cuenta <a href="Inicio de Sesión.html" class="btn-secondary">Iniciar Sesión</a></p>

        </form>

    </div>
</div>



</body>
</html>
