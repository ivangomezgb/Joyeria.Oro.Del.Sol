<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="overlay">
        <div class="panel">

            <div class="panel-header">
                <h2>Mi cuenta</h2>
                <span class="cerrar">✕</span>
            </div>

            <h1>Tengo una cuenta</h1>
            <p>Por favor introduzca su correo electrónico y contraseña</p>

            <form>
                <label>Correo electrónico *</label>
                <input type="email" placeholder="hello@gmail.com">

                <label>Contraseña *</label>
                <div class="password-box">
                    <input type="password">
                    <span class="ojo">👁</span>
                </div>

                <a href="#" class="forgot">Se te olvidó tu contraseña?</a>

                <button class="btn-primary">Iniciar Sesión</button>
            </form>

            <h1 class="no-cuenta">No Tengo una cuenta</h1>
            <p>Disfrute de beneficios adicionales y una experiencia más rica al crear una cuenta personal</p>

            <a href="/Registrarse/index.html" class="btn-secondary">Crear Mi Cuenta</a>


        </div>
    </div>

</body>
</html>
